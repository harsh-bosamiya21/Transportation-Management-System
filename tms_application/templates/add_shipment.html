<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Form</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">


    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap');
        
        *, body {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body {
            height: auto;
            background-color: #152733;
        }
        
        
        .form-holder {
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              text-align: center;
              min-height: 100vh;
        }
        
        .form-holder .form-content {
            position: relative;
            text-align: center;
            display: -webkit-box;
            display: -moz-box;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            padding: 60px;
        }
        
        .form-content .form-items {
            border: 3px solid #fff;
            padding: 40px;
            display: inline-block;
            width: 100%;
            min-width: 540px;
            -webkit-border-radius: 10px;
            -moz-border-radius: 10px;
            border-radius: 10px;
            text-align: left;
            -webkit-transition: all 0.4s ease;
            transition: all 0.4s ease;
        }
        
        .form-content h3 {
            color: #fff;
            text-align: left;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .form-content h3.form-title {
            margin-bottom: 30px;
        }
        
        .form-content p {
            color: #fff;
            text-align: left;
            font-size: 17px;
            font-weight: 300;
            line-height: 20px;
            margin-bottom: 30px;
        }
        
        
        .form-content label, .was-validated .form-check-input:invalid~.form-check-label, .was-validated .form-check-input:valid~.form-check-label{
            color: #fff;
        }
        
        .form-content input[type=text], .form-content input[type=password], .form-content input[type=email], .form-content select, .form-content textarea, .form-content input[type=number], .form-content input[type=date] {
            width: 100%;
            padding: 9px 20px;
            text-align: left;
            border: 0;
            outline: 0;
            border-radius: 6px;
            background-color: #fff;
            font-size: 15px;
            font-weight: 400;
            color: #000000;
            -webkit-transition: all 0.3s ease;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        
        .btn-primary{
            background-color: #6C757D;
            outline: none;
            border: 0px;
             box-shadow: none;
        }
        
        .btn-primary:hover, .btn-primary:focus, .btn-primary:active{
            background-color: #495056;
            outline: none !important;
            border: none !important;
             box-shadow: none;
        }
        
        .form-content textarea {
            position: static !important;
            width: 100%;
            padding: 8px 20px;
            border-radius: 6px;
            text-align: left;
            background-color: #fff;
            border: 0;
            font-size: 15px;
            font-weight: 300;
            color: #8D8D8D;
            outline: none;
            resize: none;
            height: 120px;
            -webkit-transition: none;
            transition: none;
            margin-bottom: 14px;
        }
        
        .form-content textarea:hover, .form-content textarea:focus {
            border: 0;
            background-color: #ebeff8;
            color: #8D8D8D;
        }
        
        .mv-up{
            margin-top: -9px !important;
            margin-bottom: 8px !important;
        }
        
        .invalid-feedback{
            color: #ff606e;
        }
        
        .valid-feedback{
           color: #2acc80;
        }
        
            </style>

   
</head>
<body>


    <div class="form-body">
        <div class="row-1">
            <div class="form-holder">
                <div class="form-content">
                    <div class="form-items">
                        <h3>Add Shipment</h3>
                        <p>Fill in the data below.</p>
                        <form class="requires-validation" method="POST" novalidate>
                            {% csrf_token %}
                        
                            <div class="col-md-12">
                                <select name="customer" class="form-control" id="customer">
                                    {% for customer in customers %}
                                    <option value="{{ customer.id }}">{{ customer.customer_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        
                            <div class="col-md-12">
                                <input type="date" name="order_date" class="form-control" id="orderDate">
                            </div>
                        
                            <div class="col-md-12">
                                <input type="date" name="shipment_date" class="form-control" id="shipmentDate">
                            </div>
                        
                            <div class="col-md-12">
                                <textarea name="package_description" class="form-control" id="packageDescription" placeholder="Enter package description" style="color: #000000;"></textarea>
                            </div>
                        
                            <div class="col-md-12">
                                <input type="number" name="quantity" class="form-control" id="quantity" placeholder="Enter quantity">
                            </div>
                        
                            <div class="col-md-12">
                                <select name="driver" class="form-control" id="driver">
                                    {% for driver in drivers %}
                                    <option value="{{ driver.id }}">{{ driver.driver_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        
                            <div class="col-md-12">
                                <select name="from_destination" class="form-control" id="fromDestination">
                                    <option value="MI">Mumbai</option>
                                    <option value="DL">Delhi</option>
                                    <option value="AMD">Ahmedabad</option>
                                </select>
                            </div>
                        
                            <div class="col-md-12">
                                <select name="to_destination" class="form-control" id="toDestination">
                                    <option value="MI">Mumbai</option>
                                    <option value="DL">Delhi</option>
                                    <option value="AMD">Ahmedabad</option>
                                </select>
                            </div>
                        
                            <div class="form-button mt-3">
                                <button id="submit" type="submit" class="btn btn-primary">Register</button>
                            </div>
                        </form>
                        
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
