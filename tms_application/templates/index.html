{% extends 'base.html' %}

{% block content %}
<div class="banner">

<div class="index-content">
    <h1>Transportation Management</h1>
    <p>We offer a wide range of Transportation across the world</p>

    {% if user.is_authenticated %}
        <a href="{% url 'services' %}"><button type="button" class="mybutton"><span class="index-span"></span> Services </button></a>
        <a href="{% url 'track' %}"><button type="button" class="mybutton"><span class="index-span"></span> Track Package </button></a>
    {% else %}
        <a href="{% url 'services' %}"><button type="button" class="mybutton"><span class="index-span"></span> Services </button></a>
        <a href="{% url 'login' %}"><button type="button" class="mybutton"><span class="index-span"></span> Log In/Sign Up</button></a>
    {% endif %}
</div>
</div>




{% endblock %}
